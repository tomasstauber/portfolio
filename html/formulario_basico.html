<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de contacto</title>
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/pages.css">
</head>

<body>
    <nav class="navbar">
        <ul class="navbar-list">
            <button class="navbar-item"><a href="./index.html">Tomas Stauber</a></button>
            <button class="navbar-item"><a href="./sobre_mi.html">Sobre Mi</a></button>
            <button class="navbar-item"><a href="./contacto.html">Contacto</a></button>
            <button class="navbar-item"><a href="./servicios.html">Servicios</a></button>
            <button class="navbar-item"><a href="./formulario_basico.html">Formulario de contacto</a></button>
        </ul>
    </nav>
    <main>
        <div class="container">
            <div class="conatiner form">
                <div class="form">
                    <form action="">

                        <label for="Nombre">Nombre</label>
                        <input type="text" name="Nombre" id="Nombre" placeholder="Ingrese su nombre" required>
                        <br>
                        <label for="Apellido">Apellido</label>
                        <input type="text" name="Apellido" id="Apellido" placeholder="Ingrese su apellido" required>  
                        <br>
                        <label for="Email">Email</label>
                        <input type="email" name="Email" id="Email" placeholder="Ingrese su email" required>
                        <br>
                        <label for="Telefono">Telefono</label>
                        <input type="number" name="Telefono" id="Telefono" placeholder="Ingrese su telefono" required>
                        <br>
                        <label for="Edad">Edad</label>
                        <input type="number" name="Edad" id="Edad" placeholder="Ingrese su edad" min="18" max="110" required>
                        <br>
                        <label for="Contrasena">Contraseña</label>
                        <input type="password" name="Contrasena" id="Contrasena" placeholder="Ingrese su contraseña" min="12" max="30" required>
                        <br>
                        <button type="submit">Enviar</button>
                        <button type="reset">Limpiar formulario</button>
                    </form>
                </div>
            </div>
        </div>
    </main>
</body>

</html>
